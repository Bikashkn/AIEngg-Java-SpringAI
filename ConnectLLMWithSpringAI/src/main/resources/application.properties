spring.application.name=ConnectLLMWithSpringAI
#OpenAI API Key
spring.ai.openai.api-key=<YOUR_OPENAI API KEY>
#spring.ai.anthropic.api-key=
spring.ai.ollama.chat.options.model=deepseek-r1:1.5b

# Gemini API Key
spring.ai.google.genai.api-key=<YOUR_GEMINI API KEY>
# Default model
#gemini-1.5-flash
#gemini-2.5-flash
spring.ai.google.genai.chat.options.model=gemini-2.5-flash

# Optional
spring.ai.google.genai.chat.options.temperature=0.7
